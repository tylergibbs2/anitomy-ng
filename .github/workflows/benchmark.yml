name: Conformance benchmark

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 1 * *"

permissions:
  contents: read

jobs:
  benchmark:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: jetli/wasm-pack-action@v0.4.0
      - uses: astral-sh/setup-uv@v5
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"
      - run: touch refs.md

      - name: Build anitomy-ng extension
        working-directory: anitomy-py
        run: uv sync

      - name: Build Rapptz adapter
        id: rapptz
        continue-on-error: true
        run: |
          cargo build --release --manifest-path scripts/adapters/rapptz/Cargo.toml
          cat > engine_rapptz.json <<JSON
          {"name":"rapptz","schema":"current","cmd":["$GITHUB_WORKSPACE/scripts/adapters/rapptz/target/release/rapptz-adapter"]}
          JSON
          rev=$(grep -A2 'name = "anitomy"' scripts/adapters/rapptz/Cargo.lock | grep -o '#[0-9a-f]\{40\}' | tr -d '#' | cut -c1-9)
          echo "- rapptz: Rapptz/anitomy-rs@${rev:-master}" >> refs.md

      - uses: actions/checkout@v4
        with:
          repository: erengy/anitomy
          ref: develop
          path: _ref/anitomy-develop
      - name: Build anitomy (develop) adapter
        id: anitomy_develop
        continue-on-error: true
        run: |
          docker run --rm -v "$GITHUB_WORKSPACE:/w" -w /w gcc:16.1.0 \
            g++ -std=c++23 -O2 -static \
              -I_ref/anitomy-develop/include \
              scripts/adapters/anitomy_develop.cpp -o develop-adapter
          cat > engine_anitomy_develop.json <<JSON
          {"name":"anitomy_develop","label":"anitomy@develop","schema":"current","cohort":"C++","cmd":["$GITHUB_WORKSPACE/develop-adapter"]}
          JSON
          echo "- anitomy_develop: erengy/anitomy@$(git -C _ref/anitomy-develop rev-parse --short HEAD)" >> refs.md

      - uses: actions/checkout@v4
        with:
          repository: erengy/anitomy
          ref: master
          path: _ref/anitomy-master
      - name: Build anitomy (master) adapter
        id: anitomy_master
        continue-on-error: true
        run: |
          g++ -std=c++14 -O2 -I_ref/anitomy-master \
            scripts/adapters/anitomy_master.cpp _ref/anitomy-master/anitomy/*.cpp \
            -o "$GITHUB_WORKSPACE/master-adapter"
          cat > engine_anitomy_master.json <<JSON
          {"name":"anitomy_master","label":"anitomy@master","schema":"old","cohort":"C++","cmd":["$GITHUB_WORKSPACE/master-adapter"]}
          JSON
          echo "- anitomy_master: erengy/anitomy@$(git -C _ref/anitomy-master rev-parse --short HEAD)" >> refs.md

      - name: Build yjl9903 adapter
        id: yjl9903
        continue-on-error: true
        run: |
          npm --prefix scripts/adapters/yjl9903 install --no-audit --no-fund
          cat > engine_yjl9903.json <<JSON
          {"name":"yjl9903","schema":"current","cohort":"JS (Node)","cmd":["node","$GITHUB_WORKSPACE/scripts/adapters/yjl9903/adapter.mjs"]}
          JSON
          ver=$(node -p "require('$GITHUB_WORKSPACE/scripts/adapters/yjl9903/node_modules/anitomy/package.json').version")
          echo "- yjl9903: npm anitomy@${ver}" >> refs.md

      - name: Build anitomy-ng wasm adapter
        id: anitomy_ng_wasm
        continue-on-error: true
        run: |
          wasm-pack build anitomy-js --release --target nodejs \
            --out-dir "$GITHUB_WORKSPACE/dist-npm/node" --out-name anitomy_ng
          cat > engine_anitomy_ng_wasm.json <<JSON
          {"name":"anitomy_ng_wasm","label":"anitomy_ng","schema":"current","cohort":"JS (Node)","cmd":["node","$GITHUB_WORKSPACE/scripts/adapters/anitomy_ng_wasm/adapter.cjs","$GITHUB_WORKSPACE/dist-npm/node"]}
          JSON

      - name: Build AnitomySharp adapter
        id: anitomysharp
        continue-on-error: true
        run: |
          dotnet build scripts/adapters/anitomysharp -c Release
          dll="$GITHUB_WORKSPACE/scripts/adapters/anitomysharp/bin/Release/net10.0/anitomysharp-adapter.dll"
          cat > engine_anitomysharp.json <<JSON
          {"name":"anitomysharp","label":"AnitomySharp","schema":"old","cohort":"C#","cmd":["dotnet","$dll"]}
          JSON
          echo "- anitomysharp: NuGet AnitomySharp@0.2.0" >> refs.md

      - name: Assemble engines-config
        run: |
          python3 - <<'PY'
          import glob, json
          engines = [json.load(open(f)) for f in sorted(glob.glob("engine_*.json"))]
          json.dump(engines, open("engines-config.json", "w"))
          print(f"{len(engines)} external engine(s):", [e["name"] for e in engines])
          PY

      - name: Run benchmark
        working-directory: anitomy-py
        run: |
          uv run --with anitopy==2.1.1 --with aniparse==2.0.0 python ../scripts/benchmark.py \
            --engines-config ../engines-config.json --out ../benchmark.md --speed

      - name: Publish to run summary
        if: always()
        run: |
          cat benchmark.md >> "$GITHUB_STEP_SUMMARY"
          echo -e "\n## Reference versions\n" >> "$GITHUB_STEP_SUMMARY"
          cat refs.md >> "$GITHUB_STEP_SUMMARY"

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: conformance-benchmark
          path: |
            benchmark.md
            refs.md
