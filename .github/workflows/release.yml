name: Release

# Manual, opt-in publishing. Bump the workspace version and push first, then
# run this from the Actions tab. Both publish jobs are gated on the protected
# `release` environment (configure required reviewers there), and both
# authenticate via OIDC Trusted Publishing — no long-lived tokens are stored
# as repo secrets.
on:
  workflow_dispatch:
    inputs:
      pypi:
        description: "Publish Python wheels + sdist to PyPI"
        type: boolean
        default: true
      crate:
        description: "Publish the anitomy-ng crate to crates.io"
        type: boolean
        default: true
      npm:
        description: "Publish the anitomy-ng wasm package to npm"
        type: boolean
        default: true
      binaries:
        description: "Build prebuilt CLI binaries and attach them to a GitHub Release"
        type: boolean
        default: true
      nuget:
        description: "Publish the AnitomyNg .NET package to NuGet.org"
        type: boolean
        default: true

permissions: {}

jobs:
  # Reuses wheels.yml; its artifacts are available to the publish job below.
  build:
    if: ${{ inputs.pypi }}
    permissions:
      contents: read
    uses: ./.github/workflows/wheels.yml

  # Reuses nuget.yml; its .nupkg artifact feeds publish-nuget below.
  build-nuget:
    if: ${{ inputs.nuget }}
    permissions:
      contents: read
    uses: ./.github/workflows/nuget.yml

  publish-pypi:
    needs: build
    if: ${{ inputs.pypi }}
    runs-on: ubuntu-latest
    environment:
      name: release
      url: https://pypi.org/project/anitomy-ng/
    permissions:
      id-token: write # mint the OIDC token PyPI Trusted Publishing exchanges
    steps:
      # Download ONLY the Python artifacts. Without a pattern this grabbed every
      # artifact in the run — including the cli-<target> binary tarballs — and
      # twine rejected `anitomy-<ver>-<target>.tar.gz` as a malformed sdist
      # ("too many top-level members"). Wheels and the sdist have distinct
      # artifact-name prefixes, so they need two filtered downloads.
      - uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: wheels-*
          merge-multiple: true
      - uses: actions/download-artifact@v4
        with:
          path: dist
          name: sdist
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
          # PEP 740 signed provenance for each artifact (default, kept explicit).
          attestations: true
          # Don't fail if a file for this version is already on PyPI — lets a
          # re-run top up a partial upload (e.g. add a missing sdist) instead of
          # erroring on the wheels that already published.
          skip-existing: true

  publish-crate:
    if: ${{ inputs.crate }}
    runs-on: ubuntu-latest
    environment: release
    permissions:
      id-token: write # exchanged for a short-lived, run-scoped crates.io token
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: rust-lang/crates-io-auth-action@v1
        id: auth
      - run: cargo publish -p anitomy-ng
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}

  publish-npm:
    if: ${{ inputs.npm }}
    runs-on: ubuntu-latest
    environment: release
    permissions:
      id-token: write # npm provenance (Sigstore attestation via OIDC)
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: jetli/wasm-pack-action@v0.4.0
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"
      - run: npm install -g npm@12
      - run: bash scripts/build-npm.sh
      - run: node anitomy-js/test/smoke.cjs # fails the release if the build is broken
      - name: Publish to npm
        working-directory: dist-npm
        # Tokenless: authenticates via GitHub OIDC against the trusted publisher
        # configured on npmjs.com, and attaches signed build provenance.
        run: npm publish --provenance --access public

  # ---- Prebuilt CLI binaries, attached to a GitHub Release ----
  # Resolve the version once (from the crate metadata) so every downstream job
  # names its artifacts and the release tag identically.
  binaries-prepare:
    if: ${{ inputs.binaries }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      version: ${{ steps.meta.outputs.version }}
      tag: v${{ steps.meta.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - id: meta
        run: |
          version=$(cargo metadata --format-version 1 --no-deps \
            | jq -r '.packages[] | select(.name == "anitomy-ng") | .version')
          echo "version=$version" >> "$GITHUB_OUTPUT"

  binaries-build:
    needs: binaries-prepare
    if: ${{ inputs.binaries }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - { target: x86_64-unknown-linux-gnu, os: ubuntu-latest }
          - { target: aarch64-unknown-linux-gnu, os: ubuntu-latest, cross: true }
          - { target: x86_64-unknown-linux-musl, os: ubuntu-latest, cross: true }
          - { target: x86_64-apple-darwin, os: macos-latest }
          - { target: aarch64-apple-darwin, os: macos-latest }
          - { target: x86_64-pc-windows-msvc, os: windows-latest }
    runs-on: ${{ matrix.os }}
    env:
      VERSION: ${{ needs.binaries-prepare.outputs.version }}
      TARGET: ${{ matrix.target }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      # Cross linker/runner for the Linux targets that aren't the runner's own
      # arch/libc (aarch64, musl); a no-op for the native macOS/Windows builds.
      - if: ${{ matrix.cross }}
        uses: taiki-e/setup-cross-toolchain-action@v1
        with:
          target: ${{ matrix.target }}
      - name: Build
        shell: bash
        run: cargo build --release --locked --features cli --bin anitomy --target "$TARGET"
      - name: Archive
        shell: bash
        run: |
          set -euo pipefail
          stage="anitomy-${VERSION}-${TARGET}"
          mkdir "$stage"
          if [ "$RUNNER_OS" = "Windows" ]; then
            cp "target/${TARGET}/release/anitomy.exe" "$stage/"
          else
            cp "target/${TARGET}/release/anitomy" "$stage/"
          fi
          cp LICENSE README.md "$stage/"
          # Files sit at the archive root (no leading dir), matching the
          # binstall bin-dir in anitomy/Cargo.toml.
          if [ "$RUNNER_OS" = "Windows" ]; then
            ( cd "$stage" && 7z a "../${stage}.zip" . >/dev/null )
          else
            tar -C "$stage" -czf "${stage}.tar.gz" .
          fi
      - uses: actions/upload-artifact@v4
        with:
          name: cli-${{ matrix.target }}
          path: |
            anitomy-*.tar.gz
            anitomy-*.zip
          if-no-files-found: error

  publish-binaries:
    needs: [binaries-prepare, binaries-build]
    if: ${{ inputs.binaries }}
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: write # create the release + tag the commit + upload assets
      id-token: write # OIDC used to sign the build-provenance attestation
      attestations: write # record the provenance attestation
    env:
      TAG: ${{ needs.binaries-prepare.outputs.tag }}
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: cli-*
          merge-multiple: true # flatten every cli-<target> artifact into dist/
      - name: Checksums
        working-directory: dist
        run: sha256sum anitomy-* > SHA256SUMS
      # Signed SLSA provenance for each archive (matches the PyPI/npm attestations).
      - uses: actions/attest-build-provenance@v2
        with:
          subject-path: |
            dist/anitomy-*.tar.gz
            dist/anitomy-*.zip
      - name: Create or update the GitHub Release
        # No repo checkout in this job, so gh can't infer the target repo from a
        # git remote (it would fail with "fatal: not a git repository"). Pass it
        # explicitly via --repo so gh uses the API directly.
        run: |
          set -euo pipefail
          if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            # Re-run: refresh assets on the existing release instead of failing.
            gh release upload "$TAG" dist/* --repo "$GITHUB_REPOSITORY" --clobber
          else
            gh release create "$TAG" \
              --repo "$GITHUB_REPOSITORY" \
              --target "$GITHUB_SHA" \
              --title "$TAG" \
              --generate-notes \
              dist/*
          fi

  publish-nuget:
    needs: build-nuget
    if: ${{ inputs.nuget }}
    runs-on: ubuntu-latest
    environment:
      name: release
      url: https://www.nuget.org/packages/AnitomyNg
    permissions:
      id-token: write # mint the OIDC token NuGet Trusted Publishing exchanges
    steps:
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"
      - uses: actions/download-artifact@v4
        with:
          name: nuget
          path: dist-nuget
      # Tokenless: exchanges the GitHub OIDC token for a short-lived NuGet API
      # key via the trusted-publishing policy configured on nuget.org. `user`
      # is the nuget.org account that owns the policy (set the repo variable).
      - uses: NuGet/login@v1
        id: login
        with:
          user: ${{ vars.NUGET_USER }}
      - run: >
          dotnet nuget push "dist-nuget/*.nupkg"
          --api-key ${{ steps.login.outputs.NUGET_API_KEY }}
          --source https://api.nuget.org/v3/index.json
          --skip-duplicate
