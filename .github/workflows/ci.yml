name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  rust-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - run: cargo clippy -p anitomy-ng --all-targets -- -D warnings
      # Lint the wasm binding too (compiles natively for the check); the actual
      # wasm build + smoke test live in wasm.yml.
      - run: cargo clippy -p anitomy-js --all-targets -- -D warnings
      - run: cargo test -p anitomy-ng

  python-test:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: astral-sh/setup-uv@v3
      - working-directory: anitomy-py
        run: uv run --extra test pytest tests/ -q
