name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  rust-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      # `--features cli` so the `anitomy` binary (gated behind that feature) is
      # linted too, not just the library.
      - run: cargo clippy -p anitomy-ng --all-targets --features cli -- -D warnings
      # Lint the wasm binding too (compiles natively for the check); the actual
      # wasm build + smoke test live in wasm.yml.
      - run: cargo clippy -p anitomy-js --all-targets -- -D warnings
      - run: cargo test -p anitomy-ng

  python-test:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: astral-sh/setup-uv@v3
      - working-directory: anitomy-py
        run: uv run --extra test pytest tests/ -q

  dotnet-test:
    # Builds the C ABI natively, then runs the C# binding's tests against it —
    # this exercises the whole C#↔C-ABI↔Rust path on each OS (the per-OS native
    # library name is why `lib` differs). Packaging lives in nuget.yml.
    strategy:
      matrix:
        include:
          - { os: ubuntu-latest, lib: libanitomy.so }
          - { os: macos-latest, lib: libanitomy.dylib }
          - { os: windows-latest, lib: anitomy.dll }
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"
      - run: cargo build -p anitomy-ng-c --release
      - run: >
          dotnet test bindings/csharp/AnitomyNg.Tests/AnitomyNg.Tests.csproj -c Release
          -p:NativeLib=${{ github.workspace }}/target/release/${{ matrix.lib }}
