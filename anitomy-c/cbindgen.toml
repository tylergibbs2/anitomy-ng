language = "C"
header = """/* Generated by cbindgen from anitomy-c. Do not edit by hand.
   This Source Code Form is subject to the terms of the Mozilla Public
   License, v. 2.0. */"""
include_guard = "ANITOMY_H"
pragma_once = true
autogen_warning = "/* WARNING: this file is auto-generated; edit anitomy-c/src/lib.rs instead. */"
tab_width = 4
style = "type"
cpp_compat = true
usize_is_size_t = true

[export]
# Emit the ANITOMY_OPTION_* bit constants and the version prefix.
prefix = ""

[export.rename]
"AnitomyResult" = "AnitomyResult"

[parse]
parse_deps = false
